{{- if not .Values.config.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "central-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "central-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLUSTER_TOKENS: {{ required "config.clusterTokens is required and must not be empty" .Values.config.clusterTokens | toJson | quote }}
  {{- if .Values.config.mcpApiKey }}
  MCP_API_KEY: {{ .Values.config.mcpApiKey | quote }}
  {{- end }}
{{- end }}
